name: Update publications from Google Scholar

# Refreshes assets/publications.json on a schedule and commits any changes.
# The Publications page renders from that file (with a built-in fallback list).
#
# Reliability: set a repository secret named SERPAPI_KEY (free tier is plenty)
# for dependable results. Without it the job falls back to the `scholarly`
# package, which Google may rate-limit — in that case nothing is committed and
# the page keeps showing the last good list.

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch: {}    # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install scholarly requests

      - name: Fetch publications from Google Scholar
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/update_publications.py

      - name: Commit updated publications.json
        run: |
          if ! git diff --quiet -- assets/publications.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/publications.json
            git commit -m "chore: update publications from Google Scholar"
            git push
          else
            echo "No changes to publications.json."
          fi
